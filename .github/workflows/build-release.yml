name: Build and Release
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
      - hotfix/*

env:
  DOTNET_INSTALL_DIR: '${{ github.workspace }}/.dotnet'
  NUGET_PACKAGES: '${{ github.workspace }}/.nuget/packages'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DOTNETUP_ARTIFACTPATH: '${{ github.workspace }}/dotnetup'

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-11-arm, ubuntu-latest, macos-latest, macos-15-intel]
    steps:
      - name: Get the sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Run Cake script
        id: cake
        uses: cake-build/cake-action@v3
        with:
          file-path: cake.cs
          target: GitHub-Actions

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Get the sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Download dotnetup artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: dotnetup_*
          path: '${{ github.workspace }}/dotnetup'

      - name: Run Cake script
        uses: cake-build/cake-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          file-path: release.cs
          target: GitHub-Actions-Release
